name: medflow
description: MedFlow - фінансовий менеджер для медичної практики ФОП
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Secure storage for tokens
  flutter_secure_storage: ^9.2.0

  # Charts
  fl_chart: ^0.68.0

  # Excel export
  excel: ^4.0.0
  path_provider: ^2.1.0
  share_plus: ^9.0.0
  permission_handler: ^11.3.0

  # UI
  google_fonts: ^6.2.0
  intl: ^0.19.0

  # Navigation
  go_router: ^14.2.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
