server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # Merge duplicate slashes (e.g. //api/ → /api/) to prevent 404s
    merge_slashes on;

    # Gzip compression — reduces transfer size by 60-80%
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Cache static assets (JS, CSS, images) for 1 year
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Reverse proxy API requests to the backend service
    # BACKEND_URL must NOT end with '/' — trailing slash is stripped in Dockerfile CMD
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Serve frontend SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
