server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # Merge duplicate slashes (e.g. //api/ → /api/) to prevent 404s
    merge_slashes on;

    # Performance: sendfile + tcp optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Keep-alive: reuse connections instead of opening new ones per request
    keepalive_timeout 65;
    keepalive_requests 1000;

    # Open file cache — avoids repeated stat() / open() syscalls for static files
    open_file_cache max=1000 inactive=60s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Gzip compression — reduces transfer size by 60-80%
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml application/wasm font/woff2;

    # Serve pre-compressed gzip files if they exist (built at Docker build time)
    gzip_static on;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets (JS, CSS, images, fonts) for 1 year
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif|gz)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        try_files $uri =404;
    }

    # Cache HTML for a short time to allow updates
    location ~* \.html$ {
        expires 5m;
        add_header Cache-Control "public, no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Reverse proxy API requests to the backend service
    # BACKEND_URL must NOT end with '/' — trailing slash is stripped in Dockerfile CMD
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Buffer proxy responses to reduce latency
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 16k;
    }

    # Serve frontend SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
